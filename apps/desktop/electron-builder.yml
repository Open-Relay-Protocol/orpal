appId: com.prograde.orpal
productName: Orpal
# Set explicitly: in an npm workspace `electron` is hoisted to the root
# node_modules, so electron-builder (run from apps/desktop) can't auto-detect it.
electronVersion: 33.2.1
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Don't rebuild native modules at packaging time. better-sqlite3 is an optional
# dependency hoisted by the workspace; rather than fight that during packaging we
# ship without it and the app uses its JSON-store fallback (SPEC-equivalent, just
# no SQLite). Build locally on Linux with `npm run dist:desktop` to include it.
npmRebuild: false
mac:
  category: public.app-category.social-networking
  extendInfo:
    NSCameraUsageDescription: Orpal uses the camera to scan a contact's identity QR code.
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  executableName: orpal
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - AppImage
    - deb
  category: Network
  synopsis: Blind-rendezvous P2P messaging & file transfer on the Open Relay Protocol
deb:
  # Ubuntu 24.04's 64-bit time_t transition renamed several runtime libs to
  # *t64. Declare both names as alternatives so the package installs on 24.04
  # (t64) and older releases (original names) alike.
  depends:
    - libgtk-3-0t64 | libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0t64 | libatspi2.0-0
    - libuuid1
    - libsecret-1-0
